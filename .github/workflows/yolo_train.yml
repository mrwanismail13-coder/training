name: Train YOLOv11 on GitHub Actions

on:
  workflow_dispatch: # يتيح لك تشغيل التدريب يدوياً بزرار من موقع GitHub نفسه

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
      # 1. سحب الكود الحالي من مستودع GitHub بتاعك
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. تهيئة بيئة بايثون جوه السيرفر
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. تثبيت مكتبات Ultralytics و Roboflow الرسمية
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ultralytics roboflow

      # 4. تحميل الـ Dataset أوتوماتيك من حسابك في Roboflow
      - name: Download Dataset from Roboflow
        env:
          ROBOFLOW_API_KEY: "LMsnELtbcr9ixfkRqsVF" # ⚠️ امسح ده وحط هنا الـ Private API Key الطويل بتاعك
        run: |
          python -c "
          from roboflow import Roboflow
          import os
          rf = Roboflow(api_key=os.environ['ROBOFLOW_API_KEY'])
          project = rf.workspace('ismails-workspace-2eanf').project('8-ball-pool-srncq-me6rc')
          dataset = project.version(3).download('yolov8')
          "

      # 5. تصحيح مسارات المجلدات جوه ملف data.yaml ليتوافق مع السيرفر
      - name: Fix data.yaml paths
        run: |
          if [ -d "./8-Ball-Pool-3" ]; then
            sed -i 's|../train|train|g' ./8-Ball-Pool-3/data.yaml
            sed -i 's|../valid|valid|g' ./8-Ball-Pool-3/data.yaml
            sed -i 's|../test|test|g' ./8-Ball-Pool-3/data.yaml
          fi

      # 6. بدء تدريب موديل YOLOv11 Nano من الصفر على السيرفر
      - name: Run YOLOv11 Training
        run: |
          python -c "
          from ultralytics import YOLO
          import os
          
          # استدعاء الموديل الخام والبدء في التدريب لـ 150 لفة
          model = YOLO('yolo11n.pt')
          
          yaml_path = './8-Ball-Pool-3/data.yaml'
          if os.path.exists(yaml_path):
              model.train(data=yaml_path, epochs=150, imgsz=640, device='cpu', cache=True)
          else:
              print('Error: data.yaml not found!')
          "

      # 7. حفظ ورفع ملف الأوزان الناتجة (best.pt) عشان تقدر تحمله مجاناً
      - name: Upload Trained Weights
        if: always() # يضمن الرفع حتى لو حصلت مشكلة خفيفة في النهاية
        uses: actions/upload-artifact@v4
        with:
          name: yolov11-8ballpool-final-weights
          path: runs/detect/train/weights/best.pt
