name: Train YOLO Model

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Dataset
        run: |
          echo "Checking dataset structure..."
          ls -R dataset

      - name: Train YOLO
        run: |
          python train.py

      - name: Find Model Files
        run: |
          echo "Searching for .pt files..."
          find . -type f -name "*.pt"

      - name: Upload best.pt
        uses: actions/upload-artifact@v4
        with:
          name: best-model
          path: runs/pool_detector/weights/best.pt
          if-no-files-found: warn

      - name: Upload last.pt
        uses: actions/upload-artifact@v4
        with:
          name: last-model
          path: runs/pool_detector/weights/last.pt
          if-no-files-found: warn
