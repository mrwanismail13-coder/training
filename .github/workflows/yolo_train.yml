name: Train YOLO

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train Model
        run: |
          python train.py

      - name: Show PT Files
        run: |
          echo "Searching..."
          find . -name "*.pt"

      - name: Collect Models
        run: |
          mkdir -p artifacts

          BEST=$(find . -name "best.pt" | head -n 1)
          LAST=$(find . -name "last.pt" | head -n 1)

          echo "BEST=$BEST"
          echo "LAST=$LAST"

          cp "$BEST" artifacts/best.pt
          cp "$LAST" artifacts/last.pt

          ls -la artifacts

      - name: Upload Best Model
        uses: actions/upload-artifact@v4
        with:
          name: best-model
          path: artifacts/best.pt

      - name: Upload Last Model
        uses: actions/upload-artifact@v4
        with:
          name: last-model
          path: artifacts/last.pt
