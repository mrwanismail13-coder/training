name: Train YOLOv11 from Local Dataset

on:
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ultralytics
        run: |
          python -m pip install --upgrade pip
          pip install ultralytics

      - name: Run YOLOv11 Training
        run: |
          python -c "
          from ultralytics import YOLO
          import os
          
          model = YOLO('yolo11n.pt')
          yaml_path = 'dataset/data.yaml'
          
          if os.path.exists(yaml_path):
              print('Found data.yaml! Starting actual training...')
              # أجبرنا الموديل هنا يحفظ المخرجات في مجلد ثابت اسمه my_train جوه runs/detect
              model.train(
                  data=yaml_path, 
                  epochs=150, 
                  imgsz=640, 
                  device='cpu', 
                  cache=True,
                  project='runs/detect',
                  name='my_train'
              )
          else:
              raise FileNotFoundError(f'Critical Error: {yaml_path} does not exist!')
          "

      # تعديل خطوة الرفع لجلب المجلد بالكامل لضمان الحصول على الملف فوراً
      - name: Upload Trained Weights
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yolov11-8ballpool-local-weights
          path: runs/detect/my_train/weights/best.pt
